[phases.setup]
nixPkgs = ["python312", "gcc", "pkg-config", "cairo"]
aptPkgs = ["cmake", "libxcb1-dev", "libxcb-render0-dev", "libxcb-shm0-dev",
           "libxext-dev", "libpq-dev", "ffmpeg", "portaudio19-dev", "libcairo2-dev"]

[phases.install]
cmds = [
  "python -m venv --copies /opt/venv && . /opt/venv/bin/activate && PKG_CONFIG_PATH=/root/.nix-profile/lib/pkgconfig:/usr/lib/x86_64-linux-gnu/pkgconfig:$PKG_CONFIG_PATH pip install -r requirements_utf8.txt"
]

[phases.build]
cmds = []

[start]
cmd = "uvicorn main:app --host 0.0.0.0 --port $PORT"